quarkus.banner.enabled = false
quarkus.log.min-level=TRACE

quarkus.log.category."org.l2x6.jrebuild".level=DEBUG
quarkus.log.category."org.l2x6.jrebuild.pnc".level=TRACE
quarkus.log.category."org.l2x6.cli.assured.CommandSpec".level=WARN

quarkus.index-dependency.pnc-rest-api.group-id=org.jboss.pnc

quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=50
